name: Mantenimiento
description: Tarea de mantenimiento (habilitar/deshabilitar capas, actualizar metadatos, reemplazos)
title: "[Mantenimiento] "
labels: [mantenimiento]
body:
  - type: input
    id: nodo
    attributes:
      label: Nodo y capa(s)
      placeholder: "mocupp-pastos: cobertura_pastos_cr_2021"
    validations:
      required: true
  - type: dropdown
    id: tipo
    attributes:
      label: Tipo de tarea
      options:
        - Habilitar/deshabilitar capa
        - Actualizar título/abstract
        - Reemplazar datos de una capa
        - Corrección de metadatos (ciclo SNIT)
        - Respaldo / restauración
        - Otro
    validations:
      required: true
  - type: textarea
    id: detalle
    attributes:
      label: Detalle
    validations:
      required: true
