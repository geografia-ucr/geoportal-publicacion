# Nodo MOCUPP - Pastos
# Configuración declarativa validable contra config/esquema-nodo.json.
# Fuentes: publicar_mocupp_pastos.txt (10 capas regionales Brunca),
# publicar_mocupp_pastos_nacionales.txt (5 capas nacionales, 2026-07-14),
# mantenimiento_mocupp_pastos_20260720.txt (deshabilitado de las 10 Brunca y
# abstracts de las 5 nacionales), generar_metadatos_pastos_nacionales.py y
# metadatos/mocupp-pastos/{actual,nacionales}/*.xml del repo viejo.
#
# Las 10 capas regionales de la Brunca están DESHABILITADAS en GeoServer desde
# 2026-07-20 (enabled=false); sus datos NO están en datos/ de este repo: viven
# en el servidor (/var/lib/docker/volumes/geoportal-gsdatadir/_data/mocupp_pastos/)
# y en ~/geografia-ucr/datos-fuente/. Solo las 5 nacionales (*_cr_*) siguen activas.

nodo:
  slug: mocupp-pastos
  titulo: MOCUPP - Pastos
  workspace: mocupp_pastos
  datastore: mocupp_pastos
  datastore_tipo: shapefile_dir
  responsable: Escuela de Geografía, Universidad de Costa Rica (EG-UCR)
  contacto: melvin.lizanoaraya@ucr.ac.cr

defaults:
  crs_destino: EPSG:8908
  formato: shapefile
  licencia: CC-BY-4.0
  destinos:
    snit: true
    geonode: true

capas:
