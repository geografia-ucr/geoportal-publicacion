      Capa geográfica que muestra la cobertura de pastos para el año 2020 en la
      región Brunca de Costa Rica, la cual es relevante para diversos fines
      agropecuarios, ambientales, históricos, entre otros.
    palabras_clave: [MOCUPP, Pastos, "2020", Costa Rica, Región Brunca]
    anio: 2020
    extension: brunca
    habilitada: false
    archivo: Paisaje_cobertura_pastos_2020.shp
    sha256: null
    fuente:
      ubicacion: Servidor GeoServer (_data/mocupp_pastos/) y ~/geografia-ucr/datos-fuente/
      crs_origen: EPSG:8908
    metadatos:
      estado: enviado
      identificador_snit: CR_EG-UCR_CPASRB_2020_10K_VE
    publicado:
      geoserver: "2026-03-03"  # TODO: fecha aproximada, no consta en los .txt del repo viejo
