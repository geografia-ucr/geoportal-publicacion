    archivo: cultivo_cafe_2022.gpkg
    sha256: 8253af1a918d0584021b68766144270a353a9c704c416894b0bff14e216834ff
    fuente:
      archivo_original: cultivo_cafe_2022_fin.gpkg
      ubicacion: ~/geoportal/publicacion/mocupp_cafe/ (solo local, excluido de git)
      crs_origen: EPSG:8908
    transformaciones:
      - tipo: ogr2ogr
