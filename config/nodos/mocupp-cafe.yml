# Nodo MOCUPP - Café
# Configuración declarativa validable contra config/esquema-nodo.json.
# Fuentes: publicar_mocupp_cafe.txt y metadatos/mocupp-cafe/actual/*.xml del
# repo viejo (~/geoportal/publicacion). Un datastore GeoPackage por capa
# (no existe datastore tipo "directorio de GeoPackage"); cada datastore lleva
# el mismo nombre de la capa.

nodo:
  slug: mocupp-cafe
  titulo: MOCUPP - Café
  workspace: mocupp_cafe
  # datastore se omite: en gpkg_por_capa cada capa tiene su propio datastore
  # homónimo (cultivo_cafe_2021, cobertura_arborea_2021, ...).
  datastore_tipo: gpkg_por_capa
  responsable: INISEFOR, Universidad Nacional de Costa Rica
  contacto: mauricio.vega.araya@una.ac.cr

defaults:
  crs_destino: EPSG:8908
  formato: gpkg
  licencia: CC-BY-4.0
  destinos:
    snit: true
    geonode: true

capas:
  # Títulos y abstracts: exactamente los publicados en los featureTypes de
  # GeoServer (publicar_mocupp_cafe.txt).
  # Transformación común: ogr2ogr -nln para renombrar la capa interna del
  # GeoPackage y quitar el sufijo _fin; los *_fin.gpkg originales quedan como
  # fuente (solo en el repo viejo, mocupp_cafe/ está excluido de git por tamaño).
  - slug: cultivo_cafe_2021
    titulo: Cultivo de café 2021
    abstract: Áreas de cultivo de café en Costa Rica para el año 2021
    palabras_clave: [MOCUPP, Café, Costa Rica, "2021"]
    anio: 2021
    extension: nacional
    habilitada: true
    archivo: cultivo_cafe_2021.gpkg
    sha256: 390982529d07f37f44b297cdea2a7da35203eddcfc6094a74c97a37ec8804b31
    fuente:
      archivo_original: cultivo_cafe_2021_fin.gpkg
      ubicacion: ~/geoportal/publicacion/mocupp_cafe/ (solo local, excluido de git)
      crs_origen: EPSG:8908
    transformaciones:
      - tipo: ogr2ogr
        descripcion: Renombrado del archivo y de la capa interna (quita el sufijo _fin)
        comando: ogr2ogr -nln cultivo_cafe_2021 mocupp_cafe/cultivo_cafe_2021.gpkg mocupp_cafe/cultivo_cafe_2021_fin.gpkg
    metadatos:
      estado: publicado
      identificador_snit: CR_INISEFOR-UNA_CCAFE_2021_25KVE
    publicado:
      geoserver: "2026-03-04"
      snit: null  # TODO: XML aprobado en el SNIT, fecha exacta de aprobación no confirmada
      geonode: null

